<template>

    <lightning-card title="Opportunity Deal Finder" icon-name="standard:opportunity">

        <div class="slds-p-around_medium">

            <lightning-input label="Stage Name" value={stageName} onchange={handleStage}>
            </lightning-input>

            <lightning-input type="number" label="Minimum Deal Amount" value={minAmount} onchange={handleAmount}>
            </lightning-input>

            <lightning-button label="Search Deals" variant="brand" onclick={handleSearch} class="slds-m-top_small">
            </lightning-button>

        </div>

        <template lwc:if={deals}>

            <div class="slds-p-around_medium">

                <template for:each={deals} for:item="deal">

                    <p key={deal.Id} class="slds-m-bottom_small">

                        <strong>{deal.Name}</strong> —
                        <lightning-formatted-number value={deal.Amount} format-style="currency">
                        </lightning-formatted-number>

                    </p>

                </template>

            </div>

        </template>

        <template lwc:if={error}>
            <p class="slds-text-color_error slds-p-around_medium">
                Error loading deals
            </p>
        </template>

    </lightning-card>

</template>
