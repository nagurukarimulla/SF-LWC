<template>
    <lightning-card title="Structured Apex Exposure Service" icon-name="standard:account">

        <div class="slds-p-around_medium">

            <lightning-input
                label="Industry"
                onchange={handleIndustryChange}>
            </lightning-input>

            <lightning-input
                type="number"
                label="Minimum Annual Revenue"
                onchange={handleRevenueChange}>
            </lightning-input>

            <lightning-dual-listbox
                label="Select Ratings"
                options={ratingOptions}
                onchange={handleRatingChange}>
            </lightning-dual-listbox>

            <lightning-button
                label="Classify Accounts"
                class="slds-m-top_medium"
                onclick={handleClassify}>
            </lightning-button>

            <template lwc:if={isLoading}>
                <lightning-spinner></lightning-spinner>
            </template>

            <template lwc:if={response}>
                <p class="slds-m-top_medium">
                    <strong>Total Accounts:</strong> {response.totalAccounts}
                </p>

                <template for:each={response.classifiedAccounts} for:item="acc">
                    <p key={acc.accountName}>
                        {acc.accountName} — ₹{acc.revenue} — {acc.category}
                    </p>
                </template>
            </template>

            <template lwc:if={error}>
                <div class="slds-text-color_error">
                    {error.body.message}
                </div>
            </template>

        </div>
    </lightning-card>
</template>
