<!-- productSyncDashboard.html - UPDATED with eventTime -->
<template>
    <lightning-card title="Product Sync Dashboard" icon-name="standard:product">
        <div class="slds-m-around_medium">
            <!-- Status and Refresh -->
            <div class="slds-grid slds-gutters slds-m-bottom_medium">
                <div class="slds-col slds-size_1-of-1 slds-text-align_right">
                    <lightning-button-icon 
                        icon-name="utility:refresh" 
                        alternative-text="Refresh" 
                        title="Refresh" 
                        onclick={handleRefresh}
                        variant="border-filled"
                        class="slds-m-right_small">
                    </lightning-button-icon>
                    <template if:true={isLoading}>
                        <lightning-spinner size="small"></lightning-spinner>
                    </template>
                </div>
            </div>
            
            <!-- Stats Summary -->
            <div class="slds-grid slds-wrap">
                <div class="slds-col slds-size_1-of-3 slds-p-around_small">
                    <lightning-card variant="shaded">
                        <div class="slds-text-align_center slds-p-around_medium">
                            <span class="slds-text-heading_large">{totalSyncs}</span>
                            <p>Total Syncs Today</p>
                        </div>
                    </lightning-card>
                </div>
                <div class="slds-col slds-size_1-of-3 slds-p-around_small">
                    <lightning-card variant="shaded">
                        <div class="slds-text-align_center slds-p-around_medium slds-text-color_success">
                            <span class="slds-text-heading_large">{successfulSyncs}</span>
                            <p>Successful</p>
                        </div>
                    </lightning-card>
                </div>
                <div class="slds-col slds-size_1-of-3 slds-p-around_small">
                    <lightning-card variant="shaded">
                        <div class="slds-text-align_center slds-p-around_medium slds-text-color_error">
                            <span class="slds-text-heading_large">{failedSyncs}</span>
                            <p>Failed</p>
                        </div>
                    </lightning-card>
                </div>
            </div>
            
            <!-- Recent Syncs -->
            <div class="slds-m-top_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_small">Recent Sync Activity</h3>
                <template if:true={recentSyncs.length}>
                    <lightning-datatable
                        key-field="productId"
                        data={recentSyncs}
                        columns={columns}
                        hide-checkbox-column="true">
                    </lightning-datatable>
                </template>
                <template if:false={recentSyncs.length}>
                    <div class="slds-align_absolute-center slds-m-vertical_medium">
                        <p class="slds-text-color_weak">No sync activity yet</p>
                    </div>
                </template>
            </div>
            
            <!-- Real-time Events -->
            <div class="slds-m-top_medium slds-p-top_medium slds-border_top">
                <h3 class="slds-text-heading_small slds-m-bottom_small">Real-time Events</h3>
                <template if:true={realtimeEvents.length}>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <template for:each={realtimeEvents} for:item="event">
                            <div key={event.id} class="slds-col slds-size_1-of-1 slds-m-bottom_xx-small">
                                <div class="slds-box slds-box_xx-small">
                                    <p>
                                        <lightning-icon icon-name={event.icon} size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                        <span class={event.statusClass}>{event.message}</span>
                                        <span class="slds-text-color_weak slds-m-left_small">{event.eventTime}</span>  <!-- CHANGED: from time to eventTime -->
                                    </p>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
                <template if:false={realtimeEvents.length}>
                    <div class="slds-align_absolute-center slds-m-vertical_medium">
                        <p class="slds-text-color_weak">No real-time events</p>
                    </div>
                </template>
            </div>
        </div>
    </lightning-card>
</template>
