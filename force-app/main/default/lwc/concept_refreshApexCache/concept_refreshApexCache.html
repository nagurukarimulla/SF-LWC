<template>

    <lightning-card title="High Value Deal Console" icon-name="standard:opportunity">

        <div class="slds-p-around_medium">

            <lightning-input type="number" label="Minimum Deal Amount" value={amount} onchange={handleAmountChange}>
            </lightning-input>

            <lightning-button label="Refresh Deals" variant="brand" onclick={handleRefresh} class="slds-m-top_small">
            </lightning-button>

        </div>

        <template lwc:if={deals}>

            <div class="slds-p-around_medium">

                <template for:each={deals} for:item="deal">

                    <div key={deal.Id} class="slds-m-bottom_small">

                        <strong>{deal.Name}</strong>

                        <lightning-formatted-number value={deal.Amount} format-style="currency">
                        </lightning-formatted-number>

                    </div>

                </template>

            </div>

        </template>

        <template lwc:if={error}>

            <div class="slds-p-around_medium slds-text-color_error">

                Error: {errorMessage}

            </div>

        </template>

    </lightning-card>

</template>
