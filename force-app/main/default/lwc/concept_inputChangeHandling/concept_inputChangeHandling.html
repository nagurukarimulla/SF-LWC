<template>

    <lightning-card
        title="Input Change Handling with Debounce"
        icon-name="utility:edit">

        <div class="slds-p-around_medium">

            <lightning-input
                label="Customer Name"
                value={customerName}
                onchange={handleTyping}>
            </lightning-input>

            <div class="slds-m-top_medium">

                <p><strong>Processed Value:</strong></p>

                <p>{customerName}</p>

            </div>

        </div>

    </lightning-card>

</template>
